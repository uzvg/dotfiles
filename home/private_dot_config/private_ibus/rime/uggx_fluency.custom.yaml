patch:
  switches:
    - name: ascii_mode
      reset: 1 # 1为默认英文，0为默认中文
  # 添加emoji输入方案
  switches/@next:
    name: emoji_suggestion
    reset: 1
    states: ["🈚️️\uFE0E", "🈶️️\uFE0F"]
  "engine/filters/@before 0": simplifier@emoji_suggestion
  # lua_filter@single_char_first_filter
  # 'engine/filters/@after':
  emoji_suggestion:
    opencc_config: emoji.json
    option_name: emoji_suggestion
    tips: all
  # 添加新的字典👉custom_phrase
  engine/translators/:
    - punct_translator
    - table_translator
    - table_translator@custom_phrase
    - lua_translator@*mint_date_time_translator # 时间、日期、星期、月份
    #  - lua_translator@date_translator
    - table_translator@phrase_encoder
    - script_translator@pinyin_simp
  punctuator/half_shape:
    "<": ["<<"]
    ">": [">>"]
    "[": ["[["]
    "]": ["]]"]
    "{": ["{"]
    "}": ["}"]
    "`": ["`"]
    "'": ["\""]
    "/q": [❓]
    "/r": [✅]
    "/s": [⏸️]
    "/d": [✅]
    "/k": [😘, 😚, 😙, 😗]
    "/t": [👉, 🧰, 💡, 👈]
    "/i": [ℹ️, ❗]
    "/l": [🔗]
    "/f": [🚩, 🚩🚩, 🚩🚩🚩]
    "/x": [❌, ✕, 𝕏]
    "/w": [⚠️, ❌, ⏹️]
    "/sc": [🏫]
    "/tc": [⚙️]
    "/ne": [≠]
    "/idt": [≡]
    "/le": [≤]
    "/ge": [≥]
    "/lt": [<]
    "/lk": [🔗]
    "/vs": [🆚]
    "/gt": [">"]
    "/c": [🔍,©]
    "/pp": [👤]
    "/pg": [✅, 🔄, ⏸️, 🕒, 🚫]
    "/tg": [🔖, 🏷️]
    "/vd": [📺, 📽, 📹]
    "/ar": [➡, ⬅, ⇔, ⇒, ⇐, 🔃]
    "/nt": [📝, 📋, 🗒️, 📒, 📓, 🗒]
    "/at": [📰, 📑, 📃, 📜, 📄, 🗞️]
    "/bk": [📖, 📚, 📘, 📗, 📙, 📔]
    "/pj": [🗃️, 💼, 📁, 📂, 🗂️, 📌, 📍, 🗄️]
    "/pn": [📇]
    "/st": [⭐, ⭐⭐, ⭐⭐⭐, ⭐⭐⭐⭐, ⭐⭐⭐⭐⭐]
    "/dot": [▪,￮]
  key_binder/bindings:
    # patch的作用，用以下列表的值，覆盖以前列表中的所有值
    # 回车上屏
    - { when: composing, accept: Shift_L, send: Return }
    # 设置分号为选择第二候选
    - { when: has_menu, accept: semicolon, send: 2 }
  custom_phrase:
    dictionary: ""
    user_dict: custom_phrase
    db_class: stabledb
    enable_completion: false
    enable_sentence: false
    initial_quality: 1
