# ———————————————————————————————————————————————————————————————————
# General settings
# ———————————————————————————————————————————————————————————————————
# https://sw.kovidgoyal.net/kitty/conf/#tab-bar
tab_bar_min_tabs 1
tab_title_max_length 20
# tab_bar_edge top

# kitty tab bar style: fade slant separator powerline custom hidden
tab_bar_style powerline
tab_powerline_style round
tab_activity_symbol 🕭

# title template
tab_title_template "{index}:{title}"

active_tab_title_template "{index}:{title}"

active_tab_font_style   bold
inactive_tab_font_style italic

# ———————————————————————————————————————————————————————————————————
# Github Dark Theme
# ———————————————————————————————————————————————————————————————————
# 活动标签 (Active Tab) - 使用 GitHub 标志性的绿色
# active_tab_foreground   #ffffff
# active_tab_background   #238636
#
# 非活动标签 (Inactive Tab) - 使用 GitHub 的深蓝背景色
# inactive_tab_foreground #8b949e
# inactive_tab_background #161b22
#
# 标签栏背景 - 保持暗色，突出彩色的标签
# tab_bar_background      #0d1117
#
# ———————————————————————————————————————————————————————————————————
# Ayu Dark theme
# ———————————————————————————————————————————————————————————————————
active_tab_foreground   #24272D
active_tab_background   #AAD84C

inactive_tab_foreground #eeeeee
inactive_tab_background #24272D
