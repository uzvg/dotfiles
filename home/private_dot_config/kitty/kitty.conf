# ———————————————————————————————————————————————————————————————————
# 字体设置 (Fonts)
# ———————————————————————————————————————————————————————————————————
# 可以使用 'kitty +list-fonts' 查看系统可用字体
font_family      family="monospace"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 12
# modify_font column_width -2px

# 符号映射（解决一些特殊图标显示过小的问题）
symbol_map U+E0A0-U+E0A3,U+E0B0-U+E0C8,U+E0CA,U+E0CC-U+E0D2,U+E0D4,U+E100-U+E161,U+E200-U+E2A9,U+E300-U+E3E3,U+E5FA-U+E62B,U+E700-U+E7C5,U+F000-U+F2E0,U+F300-U+F31C,U+F400-U+F4A3,U+F500-U+F8FF,U+FB00-U+FB06,U+FEFF Symbols Nerd Font
# ———————————————————————————————————————————————————————————————————
# 窗口布局与 Wayland 特性 (Window & Wayland)
# ———————————————————————————————————————————————————————————————————
# 强制使用 Wayland 协议（防止在某些环境下回退到 XWayland）
linux_display_server wayland

# 窗口装饰（标题栏）
hide_window_decorations yes

# 窗口内边距（让文字不紧贴边缘，视觉更舒适）
window_padding_width 8
# window_border_width 1pt
draw_minimal_borders yes

# 记住窗口大小
remember_window_size  no
initial_window_width  135c
initial_window_height 35c

# ———————————————————————————————————————————————————————————————————
# 透明度与背景 (Appearance)
# ———————————————————————————————————————————————————————————————————
# 背景透明度 (0.0 - 1.0)
# background_opacity 0.98

# 模糊设置 (仅限部分支持控制透明模糊的 Wayland 合成器，如 Hyprland)
# background_blur 1

# 透明度是否应用到动态背景（如果你使用图片背景的话）
# dynamic_background_opacity yes

# ———————————————————————————————————————————————————————————————————
# 光标与鼠标 (Cursor & Mouse)
# ———————————————————————————————————————————————————————————————————
# 光标形状: block, beam, underline
cursor_shape underline
cursor_trail 1
cursor_trail_decay 0.1 0.4

# 光标闪烁
cursor_blink_interval 0.5

# 鼠标隐藏延迟（秒）
mouse_hide_wait 3.0

# 链接点击样式
url_style curly
open_url_with default

# ———————————————————————————————————————————————————————————————————
# 性能与兼容性 (Performance & Advanced)
# ———————————————————————————————————————————————————————————————————
# 帧率限制（匹配你的显示器刷新率，Wayland 下通常会自动同步）
repaint_delay 10
# input_delay 3
sync_to_monitor yes

# 复制到剪贴板
copy_on_select yes

# 终端铃声（关闭它，非常烦人）
enable_audio_bell no

# ———————————————————————————————————————————————————————————————————
# 快捷键映射 (Keybindings)
# ———————————————————————————————————————————————————————————————————
# 默认情况下 Kitty 使用 Ctrl+Shift 作为功能前缀
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+n new_os_window
map ctrl+shift+plus change_font_size all +2.0
map ctrl+shift+minus change_font_size all -2.0
