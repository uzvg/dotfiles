# ———————————————————————————————————————————————————————————————————
# preflight before remapping
# ———————————————————————————————————————————————————————————————————
clear_all_shortcuts yes
kitty_mod alt
enabled_layouts splits:split_axis=auto

# ———————————————————————————————————————————————————————————————————
# kitty actions alias list
# ———————————————————————————————————————————————————————————————————
action_alias launch_tab launch --type=tab --cwd=current
action_alias launch_window launch --location=split --cwd=current
action_alias launch_vsplit launch --location=vsplit --cwd=current

# ———————————————————————————————————————————————————————————————————
# kitty general actions shortcuts
# ———————————————————————————————————————————————————————————————————
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+, load_config_file
map ctrl+plus change_font_size all +2.0
map ctrl+minus change_font_size all -2.0

# ———————————————————————————————————————————————————————————————————
# kitty windows shortcuts
# ———————————————————————————————————————————————————————————————————
# Create new window
map alt+n launch_window
map alt+v launch_vsplit
map alt+shift+n new_os_window

# Move focus between windows
map alt+h neighboring_window left
map alt+j neighboring_window bottom
map alt+k neighboring_window top
map alt+l neighboring_window right

# Move windows between current tab
map alt+shift+h move_window left
map alt+shift+j move_window bottom
map alt+shift+k move_window top
map alt+shift+l move_window right

# 按当前布局顺序移动下一个/上一个窗格
map alt+bracketleft previous_window
map alt+bracketright next_window

map alt+x           close_window
map alt+d      detach_window --target-tab=new

# Move windows between tabs
# https://sw.kovidgoyal.net/kitty/invocation/#detach-window
map alt+u   detach_window tab-prev
map alt+i   detach_window new-tab

# ———————————————————————————————————————————————————————————————————
# kitty tab shortcuts
# ———————————————————————————————————————————————————————————————————
# launch new tab
map kitty_mod+t launch_tab

# Moving focus between tabs
map alt+,   previous_tab
map alt+.   next_tab

# 数字快捷键直接跳转（1-9, 0）
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
map alt+0 goto_tab 10

# Tab 整体移动
map alt+shift+.   move_tab_forward
map alt+shift+,   move_tab_backward
