[window]
title = "Alacritty"
dynamic_title = true
decorations = "None"
dimensions = { columns = 135, lines = 35 }
padding = { x = 2, y = 2 }
dynamic_padding = true
opacity = 0.96
blur = true
resize_increments = true
startup_mode = "Windowed"
class = { general = "Alacritty", instance = "Alacritty" }

# [scrolling]
# history = 10000
# multiplier = 3

[font]
size = 11.9
offset = { x = 0, y =0 }

[colors]
draw_bold_text_with_bright_colors = true
transparent_background_colors = true
# 显式定义光标颜色，使用 Dracula 的高亮粉或青色
cursor = { text = "CellBackground", cursor = "#8be9fd" } 
# 或者使用 "#8be9fd" (Cyan)
vi_mode_cursor = { text = "CellBackground", cursor = "#50fa7b" } # 进入 Vi 模式时变为绿色


[env]
TERM = "alacritty"

[cursor]
style = { shape = "Underline", blinking = "Always" }
blink_interval = 500
unfocused_hollow = true

[general]
live_config_reload = true
# Install alacritty-theme
# git clone https://github.com/alacritty/alacritty-theme ~/.config/alacritty/themes
# import = ["~/.config/alacritty/themes/themes/gruvbox_material_hard_dark.toml"]
# import = ["~/.config/alacritty/themes/themes/gruvbox_dark.toml"]
import = ["~/.config/alacritty/themes/themes/dracula.toml"]

# [selection]
# save_to_clipboard = true

[terminal.shell]
program = "zellij"

# 禁用所有的alacritty快捷键，防止跟zellij的快捷键冲突
[keyboard]
bindings = []
