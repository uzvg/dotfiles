<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
    <alias binding="strong">
        <family>serif</family>
        <prefer>
            <family>Roboto Slab</family>
            <family>Blobmoji</family>
            <family>Noto Serif CJK SC</family>
            <family>宋体</family>
            <family>Blobmoji</family>
            <family>Noto Color Emoji</family>
            <family>Noto Serif</family>
            <family>Georgia</family>
            <family>Times New Roman</family>
            <family>Bitstream Vera Serif</family>
            <family>DejaVu Serif</family>
            <family>Thorndale AMT</family>
            <family>Luxi Serif</family>
            <family>Nimbus Roman No9 L</family>
            <family>Times</family>
        </prefer>
    </alias>
    <alias binding="strong">
        <family>sans-serif</family>
        <prefer>
            <family>Poppins</family>
            <family>Ubuntu</family>
            <family>黑体</family>
            <family>Blobmoji</family>
            <family>Arimo</family>
            <family>Public Sans</family>
            <family>Honor Sans</family>
            <family>Noto Sans CJK SC</family>
            <family>Noto Color Emoji</family>
            <family>Roboto</family>
            <family>Geologica</family>
            <family>Rubik</family>
            <family>SF Pro</family>
            <family>Circular Std Book</family>
            <family>SF Pro Display</family>
            <family>Product Sans</family>
            <family>Fira Sans</family>
            <family>Open Sans</family>
            <family>Apple Color Emoji</family>
            <family>Twemoji</family>
            <family>DejaVu Sans</family>
            <family>Nimbus Sans L</family>
        </prefer>
    </alias>
    <alias binding="strong">
        <family>monospace</family>
        <prefer>
            <family>CaskaydiaCove NFP</family>
            <family>CaskaydiaCove NFM</family>
            <family>BlexMono Nerd Font Propo Medium</family>
            <family>黑体</family>
            <family>Noto Color Emoji</family>
            <family>Blobmoji</family>
            <family>FiraCode Nerd Font Mono</family>
            <family>DejaVu Sans Mono</family>
        </prefer>
    </alias>
    <alias binding="strong">
        <family>宋体</family>
        <prefer>
            <family>Noto Serif CJK SC</family>
            <family>Roboto Slab</family>
            <family>Blobmoji</family>
            <family>AR PL UMing CN</family>
            <family>AR PL UMing HK</family>
            <family>AR PL UMing TW</family>
            <family>AR PL UMing TW MBE</family>
        </prefer>
    </alias>
    <alias binding="strong">
        <family>黑体</family>
        <prefer>
            <family>Noto Sans CJK SC</family>
            <family>Ubuntu</family>
            <family>Public Sans</family>
            <family>Blobmoji</family>
            <family>Noto Color Emoji</family>
            <family>FiraCode Nerd Font Mono</family>
            <family>Honor Sans CN</family>
            <family>Noto Sans CJK SC</family>
            <family>PingFang SC Regular</family>
            <family>Alibaba PuHuiTi 2.0</family>
            <family>LXGW Neo XiHei Screen</family>
            <family>文泉驿正黑</family>
        </prefer>
    </alias>
    <alias binding="strong">
        <family>emoji</family>
        <prefer>
            <family>Blobmoji</family>
            <family>Noto Color Emoji</family>
        </prefer>
    </alias>
<!--
  Fantasy faces
 -->
     <alias>
        <family>fantasy</family>
        <prefer>
            <family>Impact</family>
            <family>Copperplate Gothic Std</family>
            <family>Cooper Std</family>
            <family>Bauhaus Std</family>
        </prefer>
    </alias>
<!--
  Cursive faces
  -->
    <alias>
        <family>cursive</family>
        <prefer>
            <family>Comic Sans MS</family>
            <family>ITC Zapf Chancery Std</family>
            <family>Zapfino</family>
        </prefer>
    </alias>

</fontconfig>
