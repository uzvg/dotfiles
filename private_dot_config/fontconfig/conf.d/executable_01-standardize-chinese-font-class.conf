<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
 <match target="pattern">
  <test name="family" qual="any">
   <string>宋體</string>
  </test>
  <edit binding="same" mode="assign" name="family">
   <string>宋体</string>
  </edit>
 </match>
 <match target="pattern">
  <test name="family" qual="any">
   <string>SongTi</string>
  </test>
  <edit binding="same" mode="assign" name="family">
   <string>宋体</string>
  </edit>
 </match>
 <match target="pattern">
  <test name="family" qual="any">
   <string>黑體</string>
  </test>
  <edit binding="same" mode="assign" name="family">
   <string>黑体</string>
  </edit>
 </match>
 <match target="pattern">
  <test name="family" qual="any">
   <string>HeiTi</string>
  </test>
  <edit binding="same" mode="assign" name="family">
   <string>黑体</string>
  </edit>
 </match>
 <dir>~/.fonts</dir>
</fontconfig>
