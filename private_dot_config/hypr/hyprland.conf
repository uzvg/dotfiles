# autogenerated = 1 # remove this line to remove the warning

# hyprland multi monitors configure
monitor=eDP-1,1920x1080@165,0x0,1

# Source config files
source = ~/.config/hypr/hyprinit.conf
source = ~/.config/hypr/hyprules.conf
source = ~/.config/hypr/hyprbinds.conf

# Environment preparation for hyprland
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = _JAVA_AWT_WM_NONREPARENTING,1
# env = QT_STYLE_OVERRIDE,kvantum

input {
    kb_layout = us
    kb_options = caps:swapescape
    follow_mouse = 1
    kb_variant =
    kb_model =
    kb_rules =
    accel_profile = adaptive

    touchpad {
	disable_while_typing = true
        natural_scroll = true
	clickfinger_behavior = true
	tap-and-drag = true
        clickfinger_behavior = true
	# scroll_factor = 0.6
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    gaps_in = 5
    gaps_out = 8
    border_size = 2
    # col.active_border = rgba(282830aa)
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(00000000)
    # col.inactive_border = rgba(595959aa)
    cursor_inactive_timeout = 10
    # no_cursor_warps = true
    resize_on_border = true
    extend_border_grab_area = 15
    layout = dwindle
}

decoration {
    rounding = 5
    blur = yes
    blur_size = 2
    blur_passes = 1
    blur_new_optimizations = on
    drop_shadow = true
    shadow_range = 9
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
    multisample_edges = true
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = false
    force_split = 2
    preserve_split = yes
    default_split_ratio=1.24
    no_gaps_when_only = false
    # special_scale_factor = 0.62
    # split_width_multiplier = 0.62
}

master {
    new_is_master = true
}

gestures {
    workspace_swipe = on
    # workspace_swipe_distance = 900
}

# Example per-device config
# device:epic-mouse-v1 {
#     sensitivity = -0.5
# }

Misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    key_press_enables_dpms = true
    mouse_move_enables_dpms = true
    animate_manual_resizes = true
    focus_on_activate = true
    render_ahead_of_time = true
    # enable_swallow = true
    # animate_mouse_windowdragging = true
}

Binds {
    scroll_event_delay = 0
}
